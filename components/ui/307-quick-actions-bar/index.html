<!doctype html>
<!-- description: Click any tile below, or use the key combo shown on it — either way the same action fires, like two paths to the same row of seedlings. -->
<!-- category: navigation -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quick Actions Bar — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="qab-page">
  <div class="qab-intro">
    <p class="qab-eyebrow">Command bar</p>
    <h1 class="qab-heading">A row of shortcuts that actually respond to your keyboard</h1>
    <p class="qab-sub">Click any tile below, or use the key combo shown on it — either way the same action fires, like two paths to the same row of seedlings.</p>
  </div>

  <nav class="qab-bar" role="navigation" aria-label="Quick actions">
    <button class="qab-action" type="button" data-action="search" data-combo="mod+k">
      <span class="qab-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      </span>
      <span class="qab-label">Search</span>
      <span class="qab-kbd"><kbd>⌘</kbd><kbd>K</kbd></span>
    </button>
    <button class="qab-action" type="button" data-action="new-item" data-combo="mod+n">
      <span class="qab-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      </span>
      <span class="qab-label">New item</span>
      <span class="qab-kbd"><kbd>⌘</kbd><kbd>N</kbd></span>
    </button>
    <button class="qab-action" type="button" data-action="filter" data-combo="mod+f">
      <span class="qab-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16M7 12h10M10 19h4"/></svg>
      </span>
      <span class="qab-label">Filter</span>
      <span class="qab-kbd"><kbd>⌘</kbd><kbd>F</kbd></span>
    </button>
    <button class="qab-action" type="button" data-action="archive" data-combo="mod+e">
      <span class="qab-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="5" rx="1"/><path d="M5 9v9a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V9M10 13h4"/></svg>
      </span>
      <span class="qab-label">Archive</span>
      <span class="qab-kbd"><kbd>⌘</kbd><kbd>E</kbd></span>
    </button>
    <button class="qab-action" type="button" data-action="share" data-combo="mod+shift+s">
      <span class="qab-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="m8.6 10.5 6.9-4M8.6 13.5l6.9 4"/></svg>
      </span>
      <span class="qab-label">Share</span>
      <span class="qab-kbd"><kbd>⌘</kbd><kbd>⇧</kbd><kbd>S</kbd></span>
    </button>
  </nav>

  <p class="qab-note" id="qabNote" role="status" aria-live="polite">Try a shortcut, or click a tile.</p>
</main>
<script src="script.js"></script>
</body>
</html>
