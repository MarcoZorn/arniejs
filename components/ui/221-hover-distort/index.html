<link rel="stylesheet" href="style.css">
<main class="stage">
  <h1 class="stage__title">Hover Distort</h1>
  <p class="stage__sub">Move the cursor across the image to ripple it</p>

  <div class="distort-frame">
    <svg class="distort-defs" width="0" height="0" aria-hidden="true">
      <filter id="distortFilter" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence id="distortNoise" type="fractalNoise" baseFrequency="0.012 0.02" numOctaves="2" seed="7" result="noise"></feTurbulence>
        <feDisplacementMap id="distortMap" in="SourceGraphic" in2="noise" scale="0" xChannelSelector="R" yChannelSelector="G"></feDisplacementMap>
      </filter>
    </svg>

    <img class="distort-img" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=900&auto=format&fit=crop" alt="Mountain lake landscape reflecting the sky" loading="lazy">
  </div>
</main>
<script src="script.js"></script>
