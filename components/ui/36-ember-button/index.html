<!doctype html>
<!-- description: A warm, glowing pulse breathes beneath the surface, like embers in a hearth. -->
<!-- category: buttons -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ember Button — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="stage">
  <h1 class="stage__title">Ember button</h1>
  <p class="stage__sub">A warm, glowing pulse breathes beneath the surface, like embers in a hearth.</p>

  <div class="grid">
    <button class="ember-btn" type="button">
      <span class="ember-btn__glow" aria-hidden="true"></span>
      <span class="ember-btn__spark ember-btn__spark--1" aria-hidden="true"></span>
      <span class="ember-btn__spark ember-btn__spark--2" aria-hidden="true"></span>
      <span class="ember-btn__spark ember-btn__spark--3" aria-hidden="true"></span>
      <span class="ember-btn__label">Stoke the fire</span>
    </button>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
