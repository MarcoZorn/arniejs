<link rel="stylesheet" href="style.css">
<main class="stage">
  <h1 class="stage__title">Kinetic Typography</h1>
  <p class="stage__sub">Words emphasize themselves in sequence, as if spoken</p>

  <div class="kinetic" id="kinetic">
    <span class="kinetic__word">Words</span>
    <span class="kinetic__word">move</span>
    <span class="kinetic__word">like</span>
    <span class="kinetic__word kinetic__word--accent">they're</span>
    <span class="kinetic__word kinetic__word--accent">spoken.</span>
  </div>

  <button class="kinetic__replay" type="button" id="kineticReplay">Replay</button>
</main>
<script src="script.js"></script>
