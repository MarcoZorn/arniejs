<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clay Tooltip — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="demo">
  <p class="hint">Hover the seeds near the edges — the tooltip flips to stay on screen.</p>
  <div class="grid">
    <button class="seed" data-tip="Grows best in full sun">Top-left seed</button>
    <button class="seed" data-tip="Water twice a week">Top seed</button>
    <button class="seed" data-tip="Prefers sandy soil, drains quickly">Top-right seed</button>
    <button class="seed" data-tip="Companion plant for tomatoes">Left seed</button>
    <button class="seed center" data-tip="Center of the grove">Center seed</button>
    <button class="seed" data-tip="Attracts pollinators nearby">Right seed</button>
    <button class="seed" data-tip="Harvest after first frost">Bottom-left seed</button>
    <button class="seed" data-tip="Deep roots, drought tolerant">Bottom seed</button>
    <button class="seed" data-tip="Keep away from strong wind">Bottom-right seed</button>
  </div>
  <div class="tooltip" id="tooltip" role="tooltip"></div>
</main>
<script src="script.js"></script>
</body>
</html>
