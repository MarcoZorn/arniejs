<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Root Drawer — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="demo">
  <button class="trigger" id="openDrawer">Open Root Drawer</button>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>
  <aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawerTitle">
    <div class="drawer-header">
      <h2 id="drawerTitle">Grove Menu</h2>
      <button class="drawer-close" id="drawerClose" aria-label="Close drawer">&times;</button>
    </div>
    <nav class="drawer-nav">
      <a href="#" class="drawer-link">🌾 Fields Overview</a>
      <a href="#" class="drawer-link">💧 Irrigation</a>
      <a href="#" class="drawer-link">🌱 Seed Bank</a>
      <a href="#" class="drawer-link">🧑‍🌾 Workers</a>
      <a href="#" class="drawer-link">📊 Yield Reports</a>
    </nav>
  </aside>
</main>
<script src="script.js"></script>
</body>
</html>
