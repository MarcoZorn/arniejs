<link rel="stylesheet" href="style.css">
<main class="demo">
  <div class="qty-selector" id="qtySelector" data-min="1" data-max="8">
    <button type="button" class="qty-selector__btn" id="qtyDec" aria-label="Decrease quantity">&minus;</button>
    <span class="qty-selector__value" id="qtyValue" aria-live="polite">1</span>
    <button type="button" class="qty-selector__btn" id="qtyInc" aria-label="Increase quantity">+</button>
  </div>
  <p class="demo__note">Min 1 &middot; Max 8 &mdash; buttons disable at the limits.</p>
</main>
<script src="script.js"></script>
