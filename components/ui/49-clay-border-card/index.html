<!doctype html>
<!-- description: An animated gradient border cycling through clay tones. -->
<!-- category: cards -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clay Border Card — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="stage">
  <h1 class="stage__title">Clay border card</h1>
  <p class="stage__sub">An animated gradient border cycling through clay tones.</p>

  <article class="clay">
    <div class="clay__inner">
      <span class="clay__tag">Studio Piece</span>
      <h2 class="clay__title">Hand-Thrown Vessel</h2>
      <p class="clay__desc">
        Wheel-thrown terracotta, finished with a matte clay slip and fired twice
        for durability.
      </p>
      <span class="clay__price">$84</span>
    </div>
  </article>
</main>
<script src="script.js"></script>
</body>
</html>
