<!doctype html>
<!-- description: Press anything — the keys land here exactly as your browser reports them. -->
<!-- category: utility -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Keyboard Key Display — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="kkd-wrap">
  <p class="kkd-sub">Press anything — the keys land here exactly as your browser reports them.</p>

  <div class="kkd-stage" id="kkd-stage" tabindex="0">
    <div class="kkd-display" id="kkd-display" aria-live="polite">
      <span class="kkd-placeholder" id="kkd-placeholder">Press a key…</span>
    </div>
    <p class="kkd-hint">Click here first, then press any key or combo (try Ctrl+Shift+K)</p>
  </div>

  <div class="kkd-meta">
    <div class="kkd-meta-item">
      <span class="kkd-meta-label">event.key</span>
      <code class="kkd-meta-value" id="kkd-meta-key">—</code>
    </div>
    <div class="kkd-meta-item">
      <span class="kkd-meta-label">event.code</span>
      <code class="kkd-meta-value" id="kkd-meta-code">—</code>
    </div>
  </div>

  <ol class="kkd-history" id="kkd-history"></ol>
</main>
<script src="script.js"></script>
</body>
</html>
