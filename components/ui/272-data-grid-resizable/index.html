<!doctype html>
<!-- description: Drag the edge of any column header — with a mouse or a finger — to widen or narrow it, no rebuilding required. -->
<!-- category: data-display -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Data Grid Resizable — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="drz-wrap">
  <div class="drz-intro">
    <p class="drz-eyebrow">Inventory ledger</p>
    <h1 class="drz-title">Resize columns to fit your rows</h1>
    <p class="drz-tagline">Drag the edge of any column header — with a mouse or a finger — to widen or narrow it, no rebuilding required.</p>
  </div>

  <div class="drz-scroll">
    <table class="drz-table" id="drzTable">
      <thead>
        <tr id="drzHeadRow"></tr>
      </thead>
      <tbody id="drzBody"></tbody>
    </table>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
