<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Parallax Hero — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="hero" id="hero" aria-label="Hero banner">
  <div class="hero-stage" id="stage">
    <div class="layer layer-bg" data-depth="12" aria-hidden="true"></div>

    <img class="layer layer-mid" data-depth="34"
         src="https://picsum.photos/seed/peak1/900/900" alt="" aria-hidden="true">
    <img class="layer layer-mid layer-mid-2" data-depth="52"
         src="https://picsum.photos/seed/peak2/700/700" alt="" aria-hidden="true">

    <span class="accent accent-1" data-depth="70" aria-hidden="true"></span>
    <span class="accent accent-2" data-depth="90" aria-hidden="true"></span>
    <span class="accent accent-ring" data-depth="60" aria-hidden="true"></span>

    <div class="hero-content" data-depth="46">
      <p class="hero-eyebrow">Aurora Labs · 2026</p>
      <h1 class="hero-title">Build worlds<br>that move with you</h1>
      <p class="hero-sub">A depth-driven design toolkit for teams who want interfaces that feel alive — responsive, tactile, and unmistakably premium.</p>
      <div class="hero-actions">
        <a class="btn btn-primary" href="#">Start building</a>
        <a class="btn btn-ghost" href="#">Watch demo <span aria-hidden="true">▸</span></a>
      </div>
    </div>
  </div>
  <div class="hero-glow" aria-hidden="true"></div>
</section>
<script src="script.js"></script>
</body>
</html>
