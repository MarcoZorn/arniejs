<!doctype html>
<!-- description: One opening, tended and ready for the right person to take root. -->
<!-- category: cards -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Job Listing Card — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="job-wrap">
  <p class="job-desc">One opening, tended and ready for the right person to take root.</p>

  <article class="job-card">
    <button class="job-bookmark" type="button" id="jobBookmark" aria-pressed="false" aria-label="Save this listing">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"></path>
      </svg>
    </button>

    <div class="job-top">
      <h2 class="job-title">Senior Irrigation Systems Engineer</h2>
      <p class="job-company">Fieldwork Collective</p>
    </div>

    <div class="job-tags">
      <span class="job-tag job-tag--location">Remote (US)</span>
      <span class="job-tag job-tag--salary">$118k – $145k</span>
    </div>

    <div class="job-footer">
      <span class="job-posted">Posted 3 days ago</span>
      <button class="job-apply" type="button" id="jobApplyBtn">Apply</button>
    </div>
  </article>
</main>
<script src="script.js"></script>
</body>
</html>
