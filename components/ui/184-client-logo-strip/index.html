<!-- description: Hover a logo to bring it to full color -->
<!-- category: portfolio -->
<link rel="stylesheet" href="style.css">
<main class="stage">
  <h1 class="stage__title">Client Logo Strip</h1>
  <p class="stage__sub">Hover a logo to bring it to full color</p>

  <ul class="logo-strip" role="list">
    <li class="logo-strip__item">
      <svg viewBox="0 0 120 40" class="logo-mark" aria-label="Acme" role="img">
        <circle cx="20" cy="20" r="14" fill="var(--accent-terra)"/>
        <text x="42" y="26" font-family="Syne, sans-serif" font-weight="700" font-size="18" fill="currentColor">Acme</text>
      </svg>
    </li>
    <li class="logo-strip__item">
      <svg viewBox="0 0 120 40" class="logo-mark" aria-label="Nova" role="img">
        <rect x="6" y="8" width="24" height="24" rx="6" fill="var(--accent-moss)"/>
        <text x="42" y="26" font-family="Syne, sans-serif" font-weight="700" font-size="18" fill="currentColor">Nova</text>
      </svg>
    </li>
    <li class="logo-strip__item">
      <svg viewBox="0 0 120 40" class="logo-mark" aria-label="Orbit" role="img">
        <polygon points="18,6 30,32 6,32" fill="var(--accent-sand)"/>
        <text x="42" y="26" font-family="Syne, sans-serif" font-weight="700" font-size="18" fill="currentColor">Orbit</text>
      </svg>
    </li>
    <li class="logo-strip__item">
      <svg viewBox="0 0 120 40" class="logo-mark" aria-label="Flux" role="img">
        <rect x="6" y="14" width="24" height="12" rx="6" fill="var(--accent-rust)"/>
        <text x="42" y="26" font-family="Syne, sans-serif" font-weight="700" font-size="18" fill="currentColor">Flux</text>
      </svg>
    </li>
    <li class="logo-strip__item">
      <svg viewBox="0 0 120 40" class="logo-mark" aria-label="Halo" role="img">
        <circle cx="20" cy="20" r="14" fill="none" stroke="var(--accent-clay)" stroke-width="5"/>
        <text x="42" y="26" font-family="Syne, sans-serif" font-weight="700" font-size="18" fill="currentColor">Halo</text>
      </svg>
    </li>
    <li class="logo-strip__item">
      <svg viewBox="0 0 120 40" class="logo-mark" aria-label="Vero" role="img">
        <rect x="6" y="8" width="24" height="24" rx="12" fill="var(--accent-sage)"/>
        <text x="42" y="26" font-family="Syne, sans-serif" font-weight="700" font-size="18" fill="currentColor">Vero</text>
      </svg>
    </li>
  </ul>
</main>
<script src="script.js"></script>
