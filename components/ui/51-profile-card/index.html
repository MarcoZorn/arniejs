<link rel="stylesheet" href="style.css">

<main class="stage">
  <h1 class="stage__title">Profile card</h1>
  <p class="stage__sub">Hover the avatar to fan out the social links.</p>

  <article class="profile">
    <div class="profile__avatar-wrap" id="avatarWrap">
      <div class="profile__avatar">MK</div>
      <nav class="profile__socials" aria-label="Social links">
        <a href="#" class="profile__social" style="--i:0;" aria-label="Twitter">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22 5.9c-.7.3-1.5.6-2.3.7.8-.5 1.5-1.3 1.8-2.3-.8.5-1.7.8-2.6 1a4.1 4.1 0 0 0-7 3.7A11.6 11.6 0 0 1 3.4 4.6a4.1 4.1 0 0 0 1.3 5.5c-.7 0-1.3-.2-1.9-.5v.1c0 2 1.4 3.6 3.3 4a4.1 4.1 0 0 1-1.8.1c.5 1.6 2 2.8 3.8 2.8A8.2 8.2 0 0 1 2 18.4a11.6 11.6 0 0 0 6.3 1.8c7.5 0 11.7-6.3 11.7-11.7v-.5c.8-.6 1.5-1.3 2-2.1z"/></svg>
        </a>
        <a href="#" class="profile__social" style="--i:1;" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg>
        </a>
        <a href="#" class="profile__social" style="--i:2;" aria-label="Website">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.6 4 6 4 9s-1.5 6.4-4 9c-2.5-2.6-4-6-4-9s1.5-6.4 4-9z"/></svg>
        </a>
        <a href="#" class="profile__social" style="--i:3;" aria-label="Email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m3 7 9 6 9-6"/></svg>
        </a>
      </nav>
    </div>
    <h2 class="profile__name">Mara Kowalski</h2>
    <p class="profile__role">Market Gardener &amp; Soil Keeper</p>
    <p class="profile__bio">Growing food and community, one raised bed at a time.</p>
  </article>
</main>

<script src="script.js"></script>
