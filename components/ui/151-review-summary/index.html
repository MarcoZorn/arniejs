<link rel="stylesheet" href="style.css">
<main class="demo-wrap">
  <div class="rs-card">
    <div class="rs-headline">
      <div class="rs-score">4.6</div>
      <div class="rs-headline-meta">
        <div class="rs-stars" aria-hidden="true">★★★★★</div>
        <p class="rs-count">Based on 128 reviews</p>
      </div>
    </div>
    <ul class="rs-bars" role="list">
      <li class="rs-bar-row" data-star="5">
        <span class="rs-bar-label">5★</span>
        <span class="rs-bar-track"><span class="rs-bar-fill" style="--pct:72%"></span></span>
        <span class="rs-bar-pct">72%</span>
      </li>
      <li class="rs-bar-row" data-star="4">
        <span class="rs-bar-label">4★</span>
        <span class="rs-bar-track"><span class="rs-bar-fill" style="--pct:18%"></span></span>
        <span class="rs-bar-pct">18%</span>
      </li>
      <li class="rs-bar-row" data-star="3">
        <span class="rs-bar-label">3★</span>
        <span class="rs-bar-track"><span class="rs-bar-fill" style="--pct:6%"></span></span>
        <span class="rs-bar-pct">6%</span>
      </li>
      <li class="rs-bar-row" data-star="2">
        <span class="rs-bar-label">2★</span>
        <span class="rs-bar-track"><span class="rs-bar-fill" style="--pct:3%"></span></span>
        <span class="rs-bar-pct">3%</span>
      </li>
      <li class="rs-bar-row" data-star="1">
        <span class="rs-bar-label">1★</span>
        <span class="rs-bar-track"><span class="rs-bar-fill" style="--pct:1%"></span></span>
        <span class="rs-bar-pct">1%</span>
      </li>
    </ul>
  </div>
</main>
<script src="script.js"></script>
