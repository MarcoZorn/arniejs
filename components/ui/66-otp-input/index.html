<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Otp Input — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="stage">
  <h1 class="stage__title">Verification code</h1>
  <p class="stage__sub">Enter the 6-digit code we sent to your device.</p>

  <form class="otp" id="otpForm" autocomplete="off">
    <div class="otp__boxes" id="otpBoxes">
      <input class="otp__box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 1" data-index="0">
      <input class="otp__box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 2" data-index="1">
      <input class="otp__box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 3" data-index="2">
      <input class="otp__box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 4" data-index="3">
      <input class="otp__box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 5" data-index="4">
      <input class="otp__box" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="Digit 6" data-index="5">
    </div>
    <p class="otp__status" id="otpStatus" aria-live="polite">&nbsp;</p>
    <button class="otp__submit" type="submit" id="otpSubmit" disabled>Verify code</button>
  </form>
</main>
<script src="script.js"></script>
</body>
</html>
