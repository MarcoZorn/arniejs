<!doctype html>
<!-- description: Select some words below and shape them — bold, italic, underline, or plant a link. -->
<!-- category: forms -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rich Text Toolbar — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="richtb-wrap">
  <div class="richtb-card">
    <p class="richtb-tagline">Select some words below and shape them — bold, italic, underline, or plant a link.</p>

    <div class="richtb-toolbar" role="toolbar" aria-label="Text formatting">
      <button class="richtb-btn" type="button" data-cmd="bold" aria-label="Bold" aria-pressed="false">
        <span class="richtb-icon richtb-icon--bold">B</span>
      </button>
      <button class="richtb-btn" type="button" data-cmd="italic" aria-label="Italic" aria-pressed="false">
        <span class="richtb-icon richtb-icon--italic">I</span>
      </button>
      <button class="richtb-btn" type="button" data-cmd="underline" aria-label="Underline" aria-pressed="false">
        <span class="richtb-icon richtb-icon--underline">U</span>
      </button>
      <span class="richtb-divider" aria-hidden="true"></span>
      <button class="richtb-btn" type="button" data-cmd="link" aria-label="Insert link" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true" width="17" height="17">
          <path d="M9.5 14.5 14.5 9.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M11 7l1.4-1.4a3.5 3.5 0 1 1 5 5L16 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M13 17l-1.4 1.4a3.5 3.5 0 1 1-5-5L8 12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="richtb-editor" contenteditable="true" spellcheck="false" aria-label="Rich text editor">
      <p>Every garden note deserves a little style. Select this <strong>sentence</strong>, or any part of it, and try the toolbar above — make something <em>italic</em>, <u>underline</u> a reminder, or turn a phrase into a link.</p>
    </div>
    <p class="richtb-note" role="status" aria-live="polite"></p>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
