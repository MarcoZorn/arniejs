<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Harvest Infinite — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
  <div class="harvest-wrap">
    <h1>The Harvest Log</h1>
    <p class="sub">Scroll down — new rows load automatically as you approach the bottom.</p>

    <ul class="harvest-list" id="harvestList"></ul>

    <div class="sentinel" id="sentinel">
      <div class="loader" id="loader">
        <span></span><span></span><span></span>
      </div>
      <p class="loader-text" id="loaderText">Loading more from the field&hellip;</p>
    </div>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
