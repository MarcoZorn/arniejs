<link rel="stylesheet" href="style.css">

<main class="stage">
  <h1 class="stage__title">Ripple button</h1>
  <p class="stage__sub">Click anywhere on the button — an earth-toned ink ripple spreads from that point.</p>

  <div class="grid">
    <button class="ripple-btn" type="button"><span>Plant a seed</span></button>
    <button class="ripple-btn ripple-btn--outline" type="button"><span>Water the roots</span></button>
    <button class="ripple-btn ripple-btn--sand" type="button"><span>Harvest</span></button>
  </div>
</main>

<script src="script.js"></script>
