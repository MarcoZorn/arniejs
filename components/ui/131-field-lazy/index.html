<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Field Lazy — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="wrap">
  <header class="intro">
    <h1>Field Lazy</h1>
    <p>Blur-up progressive image loading. Scroll down — each image starts as a soft blurred placeholder and sharpens into focus as it enters view.</p>
  </header>

  <section class="gallery">
    <figure class="lazy-frame" data-lazy>
      <img
        class="lazy-img lazy-img--placeholder"
        src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 26'%3E%3Crect width='40' height='26' fill='%232e2010'/%3E%3Ccircle cx='10' cy='8' r='6' fill='%23d4a85a'/%3E%3Cpath d='M0 22 L14 10 L22 18 L28 12 L40 24 L40 26 L0 26 Z' fill='%235a7a3a'/%3E%3C/svg%3E"
        alt="Sunlit field placeholder"
      />
      <img
        class="lazy-img lazy-img--full"
        data-src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 260'%3E%3Cdefs%3E%3ClinearGradient id='sky1' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0' stop-color='%23d4a85a'/%3E%3Cstop offset='1' stop-color='%23c4622d'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='400' height='260' fill='url(%23sky1)'/%3E%3Ccircle cx='320' cy='60' r='38' fill='%23f0e6d3' opacity='0.9'/%3E%3Cpath d='M0 190 Q100 140 200 185 T400 175 L400 260 L0 260 Z' fill='%235a7a3a'/%3E%3Cpath d='M0 220 Q120 190 240 220 T400 210 L400 260 L0 260 Z' fill='%23415e29'/%3E%3Cg fill='%239b6b3a'%3E%3Ccircle cx='60' cy='210' r='4'/%3E%3Ccircle cx='90' cy='225' r='4'/%3E%3Ccircle cx='140' cy='205' r='4'/%3E%3Ccircle cx='220' cy='230' r='4'/%3E%3Ccircle cx='280' cy='215' r='4'/%3E%3Ccircle cx='340' cy='225' r='4'/%3E%3C/g%3E%3C/svg%3E"
        alt="Sunlit field, fully rendered"
      />
      <span class="lazy-tag">01 · meadow</span>
    </figure>

    <figure class="lazy-frame" data-lazy>
      <img
        class="lazy-img lazy-img--placeholder"
        src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 26'%3E%3Crect width='40' height='26' fill='%23241a0e'/%3E%3Ccircle cx='30' cy='6' r='5' fill='%23f0e6d3'/%3E%3Cpath d='M0 20 L10 12 L20 18 L30 8 L40 16 L40 26 L0 26 Z' fill='%239b6b3a'/%3E%3C/svg%3E"
        alt="Terracotta hills placeholder"
      />
      <img
        class="lazy-img lazy-img--full"
        data-src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 260'%3E%3Cdefs%3E%3ClinearGradient id='sky2' x1='0' y1='0' x2='0' y2='1'%3E%3Cstop offset='0' stop-color='%23a03820'/%3E%3Cstop offset='1' stop-color='%239b6b3a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='400' height='260' fill='url(%23sky2)'/%3E%3Ccircle cx='90' cy='50' r='30' fill='%23f0e6d3' opacity='0.85'/%3E%3Cpath d='M0 170 L80 90 L160 170 Z' fill='%233d2b14'/%3E%3Cpath d='M120 190 L220 100 L320 190 Z' fill='%232e2010'/%3E%3Crect x='0' y='190' width='400' height='70' fill='%23241a0e'/%3E%3C/svg%3E"
        alt="Terracotta hills, fully rendered"
      />
      <span class="lazy-tag">02 · hills</span>
    </figure>

    <figure class="lazy-frame" data-lazy>
      <img
        class="lazy-img lazy-img--placeholder"
        src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 26'%3E%3Crect width='40' height='26' fill='%232e2010'/%3E%3Ccircle cx='20' cy='13' r='9' fill='%238fa86e'/%3E%3C/svg%3E"
        alt="Orchard placeholder"
      />
      <img
        class="lazy-img lazy-img--full"
        data-src="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 260'%3E%3Crect width='400' height='260' fill='%233d2b14'/%3E%3Ccircle cx='90' cy='90' r='55' fill='%235a7a3a'/%3E%3Ccircle cx='210' cy='70' r='65' fill='%238fa86e'/%3E%3Ccircle cx='320' cy='100' r='50' fill='%235a7a3a'/%3E%3Cg fill='%23c4622d'%3E%3Ccircle cx='80' cy='95' r='6'/%3E%3Ccircle cx='105' cy='80' r='6'/%3E%3Ccircle cx='200' cy='60' r='6'/%3E%3Ccircle cx='225' cy='85' r='6'/%3E%3Ccircle cx='315' cy='90' r='6'/%3E%3C/g%3E%3Crect x='0' y='160' width='400' height='100' fill='%23241a0e'/%3E%3C/svg%3E"
        alt="Orchard, fully rendered"
      />
      <span class="lazy-tag">03 · orchard</span>
    </figure>
  </section>

  <p class="hint">Images sharpen automatically as they scroll into the viewport.</p>
</main>
<script src="script.js"></script>
</body>
</html>
