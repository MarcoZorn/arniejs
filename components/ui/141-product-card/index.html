<link rel="stylesheet" href="style.css">
<main class="demo-wrap">
  <div class="product-card">
    <div class="pc-media">
      <span class="pc-badge">-25%</span>
      <button class="pc-wish" type="button" aria-pressed="false" aria-label="Add to wishlist">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7.5-4.6-10-9.1C.5 8.4 2.2 5 5.6 5c2 0 3.4 1 4.4 2.5C11 6 12.4 5 14.4 5c3.4 0 5.1 3.4 3.6 6.9C19.5 16.4 12 21 12 21z"/></svg>
      </button>
      <img class="pc-img" src="https://images.unsplash.com/photo-1602934585418-f588bea4215c?w=600&q=80" alt="Hand-thrown ceramic planter" loading="lazy">
    </div>
    <div class="pc-body">
      <p class="pc-cat">Ceramics</p>
      <h3 class="pc-title">Terracotta Ridge Planter</h3>
      <div class="pc-price-row">
        <span class="pc-price-original">$48.00</span>
        <span class="pc-price">$36.00</span>
      </div>
      <button class="pc-add" type="button" data-label-idle="Add to cart" data-label-added="Added ✓">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
        <span class="pc-add-label">Add to cart</span>
      </button>
    </div>
  </div>
</main>
<script src="script.js"></script>
