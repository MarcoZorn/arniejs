<!-- description: Everyone with access to this workspace. -->
<!-- category: saas -->
<link rel="stylesheet" href="style.css">
<main class="stage">
  <h1 class="stage__title">Team members</h1>
  <p class="stage__sub">Everyone with access to this workspace.</p>

  <div class="roster">
    <div class="member-row" data-status="online">
      <div class="member-row__id">
        <span class="member-row__avatar" style="background:#c4622d">MZ</span>
        <span class="member-row__status" aria-hidden="true"></span>

          <span class="member-row__name">Marco Zorn</span>
          <span class="member-row__role">Owner</span>
        </div>
      </div>
      <div class="member-row__menu">
        <button type="button" class="member-row__kebab" aria-haspopup="true" aria-expanded="false" aria-label="Actions for Marco Zorn">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="9" cy="3.5" r="1.5" fill="currentColor"/>
            <circle cx="9" cy="9" r="1.5" fill="currentColor"/>
            <circle cx="9" cy="14.5" r="1.5" fill="currentColor"/>
          </svg>
        </button>
        <ul class="member-row__dropdown" role="menu">
          <li role="none"><button type="button" role="menuitem">View profile</button></li>
          <li role="none"><button type="button" role="menuitem">Change role</button></li>
          <li role="none"><button type="button" role="menuitem" class="is-danger">Remove member</button></li>
        </ul>
      </div>
    </div>

    <div class="member-row" data-status="online">

          <span class="member-row__name">Rene Kobayashi</span>
