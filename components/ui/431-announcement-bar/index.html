<!doctype html>
<!-- description: A small notice that clears away once it's been seen, so the space stays tidy. -->
<!-- category: cards -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Announcement Bar — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="announce-wrap">
  <p class="announce-hint">A small notice that clears away once it's been seen, so the space stays tidy.</p>

  <div class="announce-bar" id="announceBar" role="region" aria-label="Announcement">
    <div class="announce-inner">
      <span class="announce-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 11l18-7-7 18-2-8-9-3z"></path>
        </svg>
      </span>
      <p class="announce-msg">
        Spring seed sale is live — save 20% on new plots this week.
        <a class="announce-link" href="#" data-demo-link>See the offer</a>
      </p>
      <button class="announce-dismiss" type="button" id="announceDismiss" aria-label="Dismiss announcement">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <line x1="6" y1="6" x2="18" y2="18"></line>
          <line x1="18" y1="6" x2="6" y2="18"></line>
        </svg>
      </button>
    </div>
  </div>

  <div class="announce-below">
    <p class="announce-below-text">Page content would continue below the bar.</p>
    <button class="announce-reset" type="button" id="announceReset">Reset dismissal (demo only)</button>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
