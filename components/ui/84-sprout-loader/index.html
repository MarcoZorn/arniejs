<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sprout Loader — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="wrap">
  <h1 class="title">sprout loader</h1>
  <p class="subtitle">three little seedlings bouncing up out of the soil</p>

  <section class="demo">
    <div class="loader-stage">
      <div class="sprouts" id="sprouts" role="status" aria-label="Loading">
        <span class="sprout">
          <span class="leaf"></span>
          <span class="dot"></span>
        </span>
        <span class="sprout">
          <span class="leaf"></span>
          <span class="dot"></span>
        </span>
        <span class="sprout">
          <span class="leaf"></span>
          <span class="dot"></span>
        </span>
      </div>
      <div class="soil-line"></div>
    </div>

    <button class="ctrl-btn ctrl-primary" id="toggleBtn" type="button">Pause</button>
  </section>
</main>
<script src="script.js"></script>
</body>
</html>
