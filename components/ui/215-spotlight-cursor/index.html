<link rel="stylesheet" href="style.css">
<main class="demo">
  <div class="spotlight-card" id="spotlightCard">
    <div class="spotlight-card__glow" id="spotlightGlow" aria-hidden="true"></div>
    <div class="spotlight-card__content">
      <span class="spotlight-card__eyebrow">Hidden in the dark</span>
      <h2 class="spotlight-card__title">Terra Formations</h2>
      <p class="spotlight-card__text">A weathered clay object rests here — move your cursor over the card to reveal it under a warm spotlight.</p>
    </div>
  </div>
  <p class="demo__note">The spotlight follows your cursor and reveals content beneath the darkness.</p>
</main>
<script src="script.js"></script>
