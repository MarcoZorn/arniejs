<!doctype html>
<!-- description: Rootstock volatility, tracked live from the grove. -->
<!-- category: cards -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Crypto Price Card — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="crypto-wrap">
  <section class="crypto-card">
    <div class="crypto-top">
      <div class="crypto-id">
        <span class="crypto-coin" aria-hidden="true">₿</span>
        <div class="crypto-id-text">
          <span class="crypto-name">ArnieCoin</span>
          <span class="crypto-symbol">ARN</span>
        </div>
      </div>
      <button class="crypto-refresh" type="button" aria-label="Refresh price">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12a9 9 0 1 1-3-6.7"/>
          <polyline points="21 3 21 9 15 9"/>
        </svg>
      </button>
    </div>

    <p class="crypto-tagline">Rootstock volatility, tracked live from the grove.</p>

    <div class="crypto-price-row">
      <span class="crypto-price" id="cryptoPrice">$4,218.62</span>
      <span class="crypto-change is-up" id="cryptoChange">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 15 12 7 20 15"/></svg>
        <span id="cryptoChangeValue">+5.12%</span>
      </span>
    </div>
    <p class="crypto-window">24h change</p>

    <div class="crypto-chart">
      <svg id="cryptoSparkline" viewBox="0 0 300 70" preserveAspectRatio="none" width="100%" height="70">
        <polyline id="cryptoPolyline" points="0,50 25,45 50,55 75,35 100,40 125,20 150,28 175,15 200,22 225,8 250,18 275,5 300,12" fill="none" stroke="var(--accent-moss)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
      </svg>
    </div>
  </section>
</main>
<script src="script.js"></script>
</body>
</html>
