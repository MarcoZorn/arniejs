<!doctype html>
<!-- description: Pick a provider your team already trusts — we'll handle the rest. -->
<!-- category: saas -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SSO Button Group — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="sso-wrap">
  <div class="sso-card">
    <h1 class="sso-title">Sign in to Arnie</h1>
    <p class="sso-tagline">Pick a provider your team already trusts — we'll handle the rest.</p>

    <div class="sso-list" role="list">
      <button class="sso-btn" type="button" data-provider="Google" role="listitem">
        <span class="sso-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="2"/><path d="M12 8v4l3 2" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </span>
        <span class="sso-label">Continue with Google</span>
        <span class="sso-status" data-status></span>
      </button>

      <button class="sso-btn" type="button" data-provider="Microsoft" role="listitem">
        <span class="sso-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18"><rect x="4" y="4" width="7" height="7" fill="currentColor"/><rect x="13" y="4" width="7" height="7" fill="currentColor" opacity="0.6"/><rect x="4" y="13" width="7" height="7" fill="currentColor" opacity="0.6"/><rect x="13" y="13" width="7" height="7" fill="currentColor" opacity="0.3"/></svg>
        </span>
        <span class="sso-label">Continue with Microsoft</span>
        <span class="sso-status" data-status></span>
      </button>

      <button class="sso-btn" type="button" data-provider="GitHub" role="listitem">
        <span class="sso-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 3a9 9 0 0 0-2.85 17.54c.45.08.6-.2.6-.43v-1.68c-2.5.55-3.03-1.07-3.03-1.07-.41-1.04-1-1.31-1-1.31-.82-.56.06-.55.06-.55.9.06 1.38.93 1.38.93.8 1.38 2.1.98 2.6.75.08-.58.31-.98.57-1.21-2-.23-4.1-1-4.1-4.45 0-.98.35-1.79.92-2.42-.09-.23-.4-1.15.09-2.4 0 0 .75-.24 2.45.92a8.4 8.4 0 0 1 4.46 0c1.7-1.16 2.45-.92 2.45-.92.49 1.25.18 2.17.09 2.4.57.63.92 1.44.92 2.42 0 3.46-2.11 4.22-4.12 4.44.32.28.61.83.61 1.67v2.48c0 .24.15.52.61.43A9 9 0 0 0 12 3z" fill="currentColor"/></svg>
        </span>
        <span class="sso-label">Continue with GitHub</span>
        <span class="sso-status" data-status></span>
      </button>

      <button class="sso-btn" type="button" data-provider="Okta" role="listitem">
        <span class="sso-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="8" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="12" r="3" fill="currentColor"/></svg>
        </span>
        <span class="sso-label">Continue with Okta</span>
        <span class="sso-status" data-status></span>
      </button>
    </div>

    <p class="sso-note" role="status" aria-live="polite" data-note></p>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
