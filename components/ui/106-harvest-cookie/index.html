<!doctype html>
<!-- description: This site uses cookies for essential functions and to understand how our garden is used. You can accept all, reject non-ess -->
<!-- category: overlays -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Harvest Cookie — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="demo">
  <button class="trigger" id="showBanner">Show cookie banner again</button>

  <div class="cookie-banner" id="cookieBanner" role="dialog" aria-live="polite" aria-label="Cookie consent">
    <div class="cookie-icon">🍪</div>
    <div class="cookie-body">
      <div class="cookie-title">We use cookies to help things grow</div>
      <p class="cookie-text">
        This site uses cookies for essential functions and to understand how our garden is used.
        You can accept all, reject non-essential, or read our
        <a href="#" class="cookie-link">privacy policy</a>.
      </p>
    </div>
    <div class="cookie-actions">
      <button class="cookie-btn cookie-reject" id="rejectCookies">Reject</button>
      <button class="cookie-btn cookie-accept" id="acceptCookies">Accept all</button>
    </div>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
