<link rel="stylesheet" href="style.css">
<main class="wrap">
  <header class="head">
    <h1>Seed Spinners</h1>
    <p>Six earthy CSS-only loading spinners, grown from the same palette.</p>
  </header>

  <section class="grid" aria-label="Spinner showcase">
    <article class="cell">
      <div class="spinner ring" role="status" aria-label="Loading"></div>
      <span class="label">Rotating Ring</span>
    </article>

    <article class="cell">
      <div class="spinner dashed" role="status" aria-label="Loading"></div>
      <span class="label">Dashed Ring</span>
    </article>

    <article class="cell">
      <div class="spinner arc" role="status" aria-label="Loading"></div>
      <span class="label">Dual-Tone Arc</span>
    </article>

    <article class="cell">
      <div class="spinner pulse-ring" role="status" aria-label="Loading">
        <span></span><span></span><span></span><span></span><span></span><span></span>
      </div>
      <span class="label">Pulsing Dot Ring</span>
    </article>

    <article class="cell">
      <div class="spinner bounce-bars" role="status" aria-label="Loading">
        <span></span><span></span><span></span><span></span>
      </div>
      <span class="label">Bouncing Bars</span>
    </article>

    <article class="cell">
      <div class="spinner orbit" role="status" aria-label="Loading">
        <span class="orbit-dot"></span>
      </div>
      <span class="label">Orbiting Dot</span>
    </article>
  </section>
</main>
<script src="script.js"></script>
