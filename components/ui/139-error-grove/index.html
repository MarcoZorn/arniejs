<!doctype html>
<!-- description: The graft didn't take. Check the soil moisture and root connection, then try planting the seed again. -->
<!-- category: misc -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Error Grove — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="stage">
  <div class="grove" id="grove">
    <div class="error-panel" id="errorPanel">
      <div class="panel-icon" aria-hidden="true">
        <svg viewBox="0 0 48 48" width="40" height="40" fill="none">
          <path class="leaf-stem" d="M24 44 C24 32 24 24 24 16" stroke="var(--accent-rust)" stroke-width="2" stroke-linecap="round"/>
          <path class="leaf-blade" d="M24 16 C10 14 6 4 6 4 C6 4 18 2 24 16 C30 2 42 4 42 4 C42 4 38 14 24 16 Z" fill="var(--accent-rust)" opacity="0.9"/>
          <circle cx="24" cy="24" r="20" stroke="var(--accent-rust)" stroke-width="2" opacity="0.35"/>
        </svg>
      </div>

      <div class="panel-body">
        <h2 class="panel-heading">Something withered</h2>
        <p class="panel-desc">
          The graft didn't take. Check the soil moisture and root connection, then try planting the seed again.
        </p>
      </div>

      <button class="trigger-btn" id="triggerBtn" type="button">
        Trigger error
      </button>
    </div>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
