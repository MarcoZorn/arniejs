<!doctype html>
<!-- description: By the numbers -->
<!-- category: misc -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Count Up Stats — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="stage">
  <div class="spacer" aria-hidden="true">Scroll down ↓</div>

  <section class="band" aria-label="Company stats">
    <header class="band__head">
      <p class="band__eyebrow">By the numbers</p>
      <h1 class="band__title">Trusted at scale</h1>
    </header>

    <div class="stats">
      <article class="stat">
        <div class="stat__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M3 21V9l9-6 9 6v12"/><path d="M9 21v-6h6v6"/></svg>
        </div>
        <div class="stat__num"><span data-target="128" data-suffix="K+">0</span></div>
        <p class="stat__label">Active users</p>
      </article>

      <article class="stat">
        <div class="stat__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <div class="stat__num"><span data-target="99.9" data-decimals="1" data-suffix="%">0</span></div>
        <p class="stat__label">Uptime SLA</p>
      </article>

      <article class="stat">
        <div class="stat__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <div class="stat__num"><span data-prefix="$" data-target="4.2" data-decimals="1" data-suffix="M">0</span></div>
        <p class="stat__label">Processed daily</p>
      </article>

      <article class="stat">
        <div class="stat__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        <div class="stat__num"><span data-target="4.9" data-decimals="1">0</span></div>
        <p class="stat__label">Avg. rating</p>
      </article>
    </div>
  </section>

  <div class="spacer" aria-hidden="true"></div>
</main>
<script src="script.js"></script>
</body>
</html>
