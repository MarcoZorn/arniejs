<!doctype html>
<!-- description: This content is gated behind the overlay. Blur and warm tint sit beneath, dimming the rest of the page. -->
<!-- category: overlays -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Soil Overlay — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="demo">
  <button class="trigger" id="openOverlay">Open gated content</button>

  <div class="soil-overlay" id="soilOverlay">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <h2 id="modalTitle">Root Cellar Access</h2>
      <p>This content is gated behind the overlay. Blur and warm tint sit beneath, dimming the rest of the page.</p>
      <button class="modal-close" id="closeOverlay">Close</button>
    </div>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
