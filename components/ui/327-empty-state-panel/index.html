<!doctype html>
<!-- description: Search the plot list — some searches turn up nothing, and that's alright too. -->
<!-- category: overlays -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Empty State Panel — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="empty-wrap">
  <p class="empty-tagline">Search the plot list — some searches turn up nothing, and that's alright too.</p>

  <div class="empty-search-row">
    <label class="empty-search-label" for="empty-search-input">Search plots</label>
    <input type="search" id="empty-search-input" class="empty-search-input" placeholder="Try “basil”, “bed 4”, or “tomato”…" autocomplete="off">
  </div>

  <div class="empty-results" id="empty-results" aria-live="polite">

    <ul class="empty-results-list" id="empty-results-list" hidden></ul>

    <section class="empty-panel" id="empty-panel">
      <div class="empty-icon" aria-hidden="true">
        <svg viewBox="0 0 64 64" width="56" height="56" fill="none">
          <circle cx="27" cy="27" r="16" stroke="currentColor" stroke-width="3.5"/>
          <line x1="38.5" y1="38.5" x2="52" y2="52" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M20 27h14" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
        </svg>
      </div>
      <h2 class="empty-heading" id="empty-heading">No results found</h2>
      <p class="empty-desc" id="empty-desc">Nothing in the plot list matches that search. Try a different word, or clear the field to see everything again.</p>
      <button type="button" class="empty-cta" id="empty-clear-btn">Clear search</button>
    </section>

  </div>
</main>
<script src="script.js"></script>
</body>
</html>
