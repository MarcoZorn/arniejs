<!-- description: Scroll the strip to browse the frames. -->
<!-- category: fun -->
<link rel="stylesheet" href="style.css">
<main class="stage">
  <h1 class="stage__title">Reel highlights</h1>
  <p class="stage__sub">Scroll the strip to browse the frames.</p>

  <div class="filmstrip">
    <div class="filmstrip__holes" aria-hidden="true"></div>
    <div class="filmstrip__frames">
      <div class="frame" style="--tone: var(--accent-terra)"><span>01</span></div>
      <div class="frame" style="--tone: var(--accent-moss)"><span>02</span></div>
      <div class="frame" style="--tone: var(--accent-clay)"><span>03</span></div>
      <div class="frame" style="--tone: var(--accent-rust)"><span>04</span></div>
      <div class="frame" style="--tone: var(--accent-sage)"><span>05</span></div>
      <div class="frame" style="--tone: var(--accent-sand)"><span>06</span></div>
      <div class="frame" style="--tone: var(--accent-terra)"><span>07</span></div>
      <div class="frame" style="--tone: var(--accent-moss)"><span>08</span></div>
    </div>
    <div class="filmstrip__holes" aria-hidden="true"></div>
  </div>
</main>
<script src="script.js"></script>
