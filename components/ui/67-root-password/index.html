<link rel="stylesheet" href="style.css">

<main class="stage">
  <h1 class="stage__title">Root password</h1>
  <p class="stage__sub">Choose a strong password to protect your root account.</p>

  <form class="pwd" id="pwdForm" autocomplete="off">
    <label class="pwd__label" for="pwdInput">Password</label>
    <div class="pwd__field">
      <input class="pwd__input" id="pwdInput" type="password" placeholder="Enter a password" autocomplete="new-password" spellcheck="false">
      <button class="pwd__toggle" type="button" id="pwdToggle" aria-label="Show password" aria-pressed="false">
        <svg class="pwd__icon pwd__icon--eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
        <svg class="pwd__icon pwd__icon--eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a18.6 18.6 0 0 1 5.06-5.94M9.9 4.24A9.1 9.1 0 0 1 12 4c7 0 11 7 11 7a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
          <line x1="1" y1="1" x2="23" y2="23"/>
        </svg>
      </button>
    </div>

    <div class="pwd__meter" aria-hidden="false">
      <div class="pwd__segments" id="pwdSegments">
        <span class="pwd__segment"></span>
        <span class="pwd__segment"></span>
        <span class="pwd__segment"></span>
        <span class="pwd__segment"></span>
      </div>
      <p class="pwd__strength" id="pwdStrengthLabel">Enter a password</p>
    </div>

    <ul class="pwd__checklist" id="pwdChecklist">
      <li data-check="length">At least 8 characters</li>
      <li data-check="upper">Upper &amp; lowercase letters</li>
      <li data-check="number">At least one number</li>
      <li data-check="symbol">At least one symbol</li>
    </ul>

    <button class="pwd__submit" type="submit">Set root password</button>
  </form>
</main>

<script src="script.js"></script>
