<!doctype html>
<!-- description: Start typing and we'll dig up matching results as you go — arrow keys to browse, Enter to pick. -->
<!-- category: forms -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Search Input Suggestions — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="seek-wrap">
  <div class="seek-intro">
    <p class="seek-eyebrow">Find it fast</p>
    <h1 class="seek-title">Search the plot directory</h1>
    <p class="seek-sub">Start typing and we'll dig up matching results as you go — arrow keys to browse, Enter to pick.</p>
  </div>

  <div class="seek-box">
    <div class="seek-field">
      <svg class="seek-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
      <input
        class="seek-input"
        type="text"
        role="combobox"
        aria-expanded="false"
        aria-controls="seek-listbox"
        aria-autocomplete="list"
        autocomplete="off"
        placeholder="Try “tomato”, “compost”, or “raised bed”…"
      >
      <button class="seek-clear" type="button" aria-label="Clear search" hidden>&times;</button>
    </div>
    <ul class="seek-listbox" id="seek-listbox" role="listbox" hidden></ul>
    <p class="seek-status" role="status" aria-live="polite"></p>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
