<link rel="stylesheet" href="style.css">
<main class="demo">
  <div class="controls">
    <button class="trigger" id="queueOne">Delete a plant</button>
    <button class="trigger" id="queueMany">Queue 3 messages</button>
  </div>
  <div class="snackbar" id="snackbar" role="status" aria-live="polite">
    <span class="snackbar-msg" id="snackbarMsg"></span>
    <button class="snackbar-action" id="snackbarAction">Undo</button>
    <button class="snackbar-close" id="snackbarClose" aria-label="Dismiss">&times;</button>
  </div>
</main>
<script src="script.js"></script>
