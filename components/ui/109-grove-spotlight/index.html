<!doctype html>
<!-- description: Grove Spotlight — a vanilla JS ArnieJS component. Zero dependencies. -->
<!-- category: overlays -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grove Spotlight — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="demo">
  <div class="toolbar">
    <button class="fake-btn" id="target1">🌱 New Bed</button>
    <button class="fake-btn" id="target2">📅 Schedule</button>
    <button class="fake-btn" id="target3">⚙️ Settings</button>
  </div>

  <button class="trigger" id="startTour">Start onboarding tour</button>

  <div class="spotlight-overlay" id="spotlightOverlay">
    <div class="spotlight-hole" id="spotlightHole"></div>
    <div class="spotlight-tooltip" id="spotlightTooltip">
      <div class="spotlight-text" id="spotlightText"></div>
      <div class="spotlight-actions">
        <button class="spotlight-skip" id="spotlightSkip">Skip</button>
        <button class="spotlight-next" id="spotlightNext">Next</button>
      </div>
    </div>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
