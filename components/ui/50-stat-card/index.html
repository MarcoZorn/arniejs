<!doctype html>
<!-- description: KPI display with a count-up animation. -->
<!-- category: cards -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stat Card — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="stage">
  <h1 class="stage__title">Stat card</h1>
  <p class="stage__sub">KPI display with a count-up animation.</p>

  <div class="stats">
    <article class="stat">
      <span class="stat__label">Plots Tended</span>
      <span class="stat__value" data-count-to="1280" data-suffix="+">0</span>
      <span class="stat__trend stat__trend--up">&#8593; 12% this season</span>
    </article>
    <article class="stat">
      <span class="stat__label">Seeds Sown</span>
      <span class="stat__value" data-count-to="48200" data-suffix="">0</span>
      <span class="stat__trend stat__trend--up">&#8593; 8% this season</span>
    </article>
    <article class="stat">
      <span class="stat__label">Yield Rate</span>
      <span class="stat__value" data-count-to="94" data-suffix="%">0</span>
      <span class="stat__trend stat__trend--up">&#8593; 3% this season</span>
    </article>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
