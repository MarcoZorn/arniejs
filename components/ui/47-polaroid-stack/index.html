<link rel="stylesheet" href="style.css">

<main class="stage">
  <h1 class="stage__title">Polaroid stack</h1>
  <p class="stage__sub">Hover to scatter the photos like a dropped stack.</p>

  <div class="polaroids" id="polaroids">
    <figure class="polaroid" style="--r:-8deg; --x:-70px; --y:-20px;">
      <div class="polaroid__photo polaroid__photo--a"></div>
      <figcaption>Morning harvest</figcaption>
    </figure>
    <figure class="polaroid" style="--r:6deg; --x:60px; --y:-30px;">
      <div class="polaroid__photo polaroid__photo--b"></div>
      <figcaption>Greenhouse rows</figcaption>
    </figure>
    <figure class="polaroid" style="--r:-4deg; --x:-30px; --y:35px;">
      <div class="polaroid__photo polaroid__photo--c"></div>
      <figcaption>First bloom</figcaption>
    </figure>
    <figure class="polaroid" style="--r:9deg; --x:40px; --y:30px;">
      <div class="polaroid__photo polaroid__photo--d"></div>
      <figcaption>Sunset watering</figcaption>
    </figure>
  </div>
</main>

<script src="script.js"></script>
