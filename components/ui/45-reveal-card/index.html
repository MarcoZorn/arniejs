<!doctype html>
<!-- description: Hover to slide the moss overlay away. -->
<!-- category: cards -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reveal Card — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="stage">
  <h1 class="stage__title">Reveal card</h1>
  <p class="stage__sub">Hover to slide the moss overlay away.</p>

  <article class="reveal">
    <div class="reveal__content">
      <span class="reveal__tag">Harvest Note</span>
      <h2 class="reveal__title">Heirloom Tomatoes</h2>
      <p class="reveal__desc">
        Slow-grown, sun-ripened, and picked by hand — the flavor a supermarket
        tomato can only imitate.
      </p>
      <span class="reveal__price">$6.50 / lb</span>
    </div>
    <div class="reveal__overlay">
      <span class="reveal__overlay-text">Grown in the Field</span>
    </div>
  </article>
</main>
<script src="script.js"></script>
</body>
</html>
