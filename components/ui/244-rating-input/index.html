<!doctype html>
<!-- description: Click a star to lock in your rating, or arrow through them with your keyboard — the freshest bunches always earn five. -->
<!-- category: forms -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rating Input — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="rti-wrap">
  <section class="rti-card">
    <h1 class="rti-title">Rate this harvest</h1>
    <p class="rti-desc">Click a star to lock in your rating, or arrow through them with your keyboard — the freshest bunches always earn five.</p>

    <div class="rti-stars" role="radiogroup" aria-label="Star rating" tabindex="0">
      <span class="rti-star" data-value="1" role="radio" aria-checked="false" aria-label="1 star">
        <svg viewBox="0 0 24 24" width="40" height="40"><path d="M12 2.5l2.9 6.3 6.9.7-5.2 4.7 1.5 6.8L12 17.6l-6.1 3.4 1.5-6.8-5.2-4.7 6.9-.7z"/></svg>
      </span>
      <span class="rti-star" data-value="2" role="radio" aria-checked="false" aria-label="2 stars">
        <svg viewBox="0 0 24 24" width="40" height="40"><path d="M12 2.5l2.9 6.3 6.9.7-5.2 4.7 1.5 6.8L12 17.6l-6.1 3.4 1.5-6.8-5.2-4.7 6.9-.7z"/></svg>
      </span>
      <span class="rti-star" data-value="3" role="radio" aria-checked="false" aria-label="3 stars">
        <svg viewBox="0 0 24 24" width="40" height="40"><path d="M12 2.5l2.9 6.3 6.9.7-5.2 4.7 1.5 6.8L12 17.6l-6.1 3.4 1.5-6.8-5.2-4.7 6.9-.7z"/></svg>
      </span>
      <span class="rti-star" data-value="4" role="radio" aria-checked="false" aria-label="4 stars">
        <svg viewBox="0 0 24 24" width="40" height="40"><path d="M12 2.5l2.9 6.3 6.9.7-5.2 4.7 1.5 6.8L12 17.6l-6.1 3.4 1.5-6.8-5.2-4.7 6.9-.7z"/></svg>
      </span>
      <span class="rti-star" data-value="5" role="radio" aria-checked="false" aria-label="5 stars">
        <svg viewBox="0 0 24 24" width="40" height="40"><path d="M12 2.5l2.9 6.3 6.9.7-5.2 4.7 1.5 6.8L12 17.6l-6.1 3.4 1.5-6.8-5.2-4.7 6.9-.7z"/></svg>
      </span>
    </div>

    <p class="rti-value" id="rti-value" role="status" aria-live="polite">No rating yet</p>
  </section>
</main>
<script src="script.js"></script>
</body>
</html>
