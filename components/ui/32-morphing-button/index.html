<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Morphing Button — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="stage">
  <h1 class="stage__title">Morphing button</h1>
  <p class="stage__sub">Hover to morph from circle to pill, click to settle into a full terracotta rectangle.</p>

  <div class="grid">
    <button class="morph-btn" type="button">
      <span class="morph-btn__icon" aria-hidden="true">&#10003;</span>
      <span class="morph-btn__label">Confirm order</span>
    </button>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
