<link rel="stylesheet" href="style.css">

<section class="stage">
  <div class="demo">
    <h1 class="demo__title">Modal dialog</h1>
    <p class="demo__sub">A focus-trapped dialog with a blurred backdrop. Close with Esc, the backdrop, or Cancel.</p>
    <button class="btn btn--primary" id="open-modal">Invite a teammate</button>
  </div>

  <div class="backdrop" id="backdrop" hidden></div>

  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-desc" hidden>
    <div class="modal__card">
      <button class="modal__x" id="close-x" aria-label="Close dialog">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>
      </button>

      <h2 class="modal__title" id="modal-title">Invite a teammate</h2>
      <p class="modal__desc" id="modal-desc">Send an invitation to join your workspace. They'll get an email with a link to accept.</p>

      <form class="modal__form" id="modal-form">
        <label class="field">
          <span>Email address</span>
          <input type="email" name="email" placeholder="teammate@company.com" required autocomplete="off">
        </label>
        <label class="field">
          <span>Role</span>
          <select name="role">
            <option>Member</option>
            <option>Admin</option>
            <option>Viewer</option>
          </select>
        </label>

        <div class="modal__actions">
          <button type="button" class="btn btn--ghost" id="cancel">Cancel</button>
          <button type="submit" class="btn btn--primary">Send invite</button>
        </div>
      </form>
    </div>
  </div>
</section>

<script src="script.js"></script>
