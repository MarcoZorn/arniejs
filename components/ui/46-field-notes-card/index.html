<!doctype html>
<!-- description: A notebook page, ruled and a little worn. -->
<!-- category: cards -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Field Notes Card — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="stage">
  <h1 class="stage__title">Field notes card</h1>
  <p class="stage__sub">A notebook page, ruled and a little worn.</p>

  <article class="notes">
    <div class="notes__margin"></div>
    <div class="notes__spiral" aria-hidden="true">
      <span></span><span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="notes__body">
      <p class="notes__date">April 6 — overcast, cool</p>
      <h2 class="notes__title">Seedling Log</h2>
      <p class="notes__line"><span class="notes__check">&#10003;</span> Basil — sprouted day 6</p>
      <p class="notes__line"><span class="notes__check">&#10003;</span> Marigold — sprouted day 4</p>
      <p class="notes__line"><span class="notes__check notes__check--empty"></span> Peppers — still waiting</p>
      <p class="notes__scrawl">Remember to thin the carrots this weekend.</p>
    </div>
  </article>
</main>
<script src="script.js"></script>
</body>
</html>
