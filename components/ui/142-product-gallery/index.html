<link rel="stylesheet" href="style.css">
<main class="demo-wrap">
  <div class="gallery" id="gallery">
    <div class="gallery-main" id="galleryMain">
      <img id="galleryMainImg" class="gallery-main-img" src="https://images.unsplash.com/photo-1602934585418-f588bea4215c?w=1200&q=80" alt="Terracotta ridge planter, front view">
      <div class="gallery-zoom-lens" id="zoomLens" aria-hidden="true"></div>
    </div>
    <div class="gallery-thumbs" id="galleryThumbs" role="listbox" aria-label="Product images">
      <button class="gallery-thumb is-active" type="button" role="option" aria-selected="true"
        data-full="https://images.unsplash.com/photo-1602934585418-f588bea4215c?w=1200&q=80">
        <img src="https://images.unsplash.com/photo-1602934585418-f588bea4215c?w=200&q=80" alt="Front view">
      </button>
      <button class="gallery-thumb" type="button" role="option" aria-selected="false"
        data-full="https://images.unsplash.com/photo-1485955900006-10f4d324d411?w=1200&q=80">
        <img src="https://images.unsplash.com/photo-1485955900006-10f4d324d411?w=200&q=80" alt="Side view">
      </button>
      <button class="gallery-thumb" type="button" role="option" aria-selected="false"
        data-full="https://images.unsplash.com/photo-1614594975525-e45190c55d0b?w=1200&q=80">
        <img src="https://images.unsplash.com/photo-1614594975525-e45190c55d0b?w=200&q=80" alt="Detail view">
      </button>
      <button class="gallery-thumb" type="button" role="option" aria-selected="false"
        data-full="https://images.unsplash.com/photo-1459156212016-c812468e2115?w=1200&q=80">
        <img src="https://images.unsplash.com/photo-1459156212016-c812468e2115?w=200&q=80" alt="In-context view">
      </button>
    </div>
  </div>
</main>
<script src="script.js"></script>
