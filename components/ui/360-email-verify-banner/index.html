<!doctype html>
<!-- description: Your plots, harvests, and reports live here once your account is fully set up. -->
<!-- category: saas -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Email Verify Banner — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="evb-wrap">
  <p class="evb-hint">A persistent banner that nudges an unverified account to confirm its email, with a real resend cooldown.</p>

  <div class="evb-page">
    <div class="evb-banner" data-banner role="status">
      <span class="evb-icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18"><rect x="3" y="5" width="18" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><path d="M4 6l8 6 8-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </span>
      <span class="evb-text">Please verify your email to unlock all features. We sent a link to <strong data-email>jordan@example.com</strong>.</span>
      <button class="evb-resend" type="button" data-resend>Resend email</button>
      <button class="evb-dismiss" type="button" data-dismiss aria-label="Dismiss banner">&times;</button>
    </div>

    <div class="evb-content">
      <h1 class="evb-page-title">Dashboard</h1>
      <p class="evb-page-desc">Your plots, harvests, and reports live here once your account is fully set up.</p>
    </div>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
