<!doctype html>
<!-- description: Watching how one seedling of a company grows in the market. -->
<!-- category: cards -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stock Ticker Card — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="stock-wrap">
  <section class="stock-card">
    <p class="stock-desc">Watching how one seedling of a company grows in the market.</p>

    <div class="stock-head">
      <div class="stock-id">
        <span class="stock-symbol">ARNJ</span>
        <span class="stock-name">Arnie Botanicals Inc.</span>
      </div>
      <div class="stock-price-block">
        <span class="stock-price" id="stockPrice">$142.87</span>
        <span class="stock-change is-up" id="stockChange">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 15 12 7 20 15"/></svg>
          <span id="stockChangeValue">+2.34%</span>
        </span>
      </div>
    </div>

    <div class="stock-chart">
      <svg id="stockSparkline" viewBox="0 0 300 80" preserveAspectRatio="none" width="100%" height="80">
        <polyline id="stockPolyline" points="0,55 30,50 60,58 90,42 120,45 150,30 180,35 210,20 240,25 270,10 300,15" fill="none" stroke="var(--accent-moss)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
      </svg>
    </div>

    <div class="stock-tabs" role="tablist">
      <button class="stock-tab is-active" type="button" role="tab" aria-selected="true" data-range="1D">1D</button>
      <button class="stock-tab" type="button" role="tab" aria-selected="false" data-range="1W">1W</button>
    </div>
  </section>
</main>
<script src="script.js"></script>
</body>
</html>
