<link rel="stylesheet" href="style.css">
<main class="stage">
  <h1 class="stage__title">Folder Open</h1>
  <p class="stage__sub">Click the folder to peek inside</p>

  <button class="folder" id="folder" type="button" aria-pressed="false">
    <span class="folder__papers">
      <span class="folder__paper folder__paper--1"></span>
      <span class="folder__paper folder__paper--2"></span>
      <span class="folder__paper folder__paper--3"></span>
    </span>
    <span class="folder__back"></span>
    <span class="folder__flap"></span>
    <span class="folder__label">Assets</span>
  </button>
</main>
<script src="script.js"></script>
