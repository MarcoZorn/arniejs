<!-- description: Click the compass to spin toward a new direction. -->
<!-- category: fun -->
<link rel="stylesheet" href="style.css">
<main class="stage">
  <h1 class="stage__title">Find your bearing</h1>
  <p class="stage__sub">Click the compass to spin toward a new direction.</p>

  <div class="compass-wrap">
    <button class="compass" type="button" aria-label="Spin compass">
      <svg class="compass__needle" viewBox="0 0 200 200" width="220" height="220">
        <circle cx="100" cy="100" r="94" fill="none" stroke="#5a3e20" stroke-width="2"/>
        <circle cx="100" cy="100" r="80" fill="none" stroke="#3d2b14" stroke-width="1"/>
        <g fill="#a89070" font-family="Syne, sans-serif" font-size="14" font-weight="700" text-anchor="middle">
          <text x="100" y="24">N</text>
          <text x="176" y="105">E</text>
          <text x="100" y="186">S</text>
          <text x="24" y="105">W</text>
        </g>
        <g stroke="#5a3e20" stroke-width="1">
          <line x1="100" y1="10" x2="100" y2="26" />
          <line x1="190" y1="100" x2="174" y2="100" />
          <line x1="100" y1="190" x2="100" y2="174" />
          <line x1="10" y1="100" x2="26" y2="100" />
        </g>
        <g class="compass__rotor">
          <polygon points="100,26 112,100 100,100" fill="#a03820" />
          <polygon points="100,26 88,100 100,100" fill="#c4622d" />
          <polygon points="100,174 112,100 100,100" fill="#3d2b14" />
          <polygon points="100,174 88,100 100,100" fill="#5a3e20" />
          <circle cx="100" cy="100" r="8" fill="#d4a85a" stroke="#1a1208" stroke-width="2" />
        </g>
      </svg>
    </button>
    <p class="compass__readout">Heading: <span class="compass__heading">N</span></p>
  </div>
</main>
<script src="script.js"></script>
