<!doctype html>
<!-- description: drag, swipe, arrow keys or the controls below -->
<!-- category: misc -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Image Carousel — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="cf" aria-label="3D coverflow carousel">
  <header class="cf__head">
    <p class="cf__eyebrow">Gallery · Coverflow</p>
    <h1 class="cf__title">Depth of Field</h1>
    <p class="cf__sub">drag, swipe, arrow keys or the controls below</p>
  </header>

  <div class="stage" id="stage">
    <div class="deck" id="deck">
      <figure class="slide"><img src="https://picsum.photos/seed/nebula/800/1000" alt="Nebula" draggable="false"><figcaption>Nebula</figcaption></figure>
      <figure class="slide"><img src="https://picsum.photos/seed/ridge/800/1000" alt="Ridge" draggable="false"><figcaption>Ridge</figcaption></figure>
      <figure class="slide"><img src="https://picsum.photos/seed/harbor/800/1000" alt="Harbor" draggable="false"><figcaption>Harbor</figcaption></figure>
      <figure class="slide"><img src="https://picsum.photos/seed/atrium/800/1000" alt="Atrium" draggable="false"><figcaption>Atrium</figcaption></figure>
      <figure class="slide"><img src="https://picsum.photos/seed/dunes/800/1000" alt="Dunes" draggable="false"><figcaption>Dunes</figcaption></figure>
      <figure class="slide"><img src="https://picsum.photos/seed/monolith/800/1000" alt="Monolith" draggable="false"><figcaption>Monolith</figcaption></figure>
      <figure class="slide"><img src="https://picsum.photos/seed/aurora/800/1000" alt="Aurora" draggable="false"><figcaption>Aurora</figcaption></figure>
    </div>
  </div>

  <div class="cf__controls">
    <button class="nav" id="prev" aria-label="Previous">&#8249;</button>
    <div class="dots" id="dots" role="tablist" aria-label="Slides"></div>
    <button class="nav" id="next" aria-label="Next">&#8250;</button>
  </div>
</section>
<script src="script.js"></script>
</body>
</html>
