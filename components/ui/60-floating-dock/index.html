<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Floating Dock — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="demo">
  <section class="stage">
    <p class="hint">Move your cursor along the dock to see items magnify.</p>
  </section>
  <div class="dock-wrap">
    <nav class="dock" id="dock" aria-label="Application dock">
      <button class="dock-item" data-tip="Homestead"><span class="dock-emoji">🏡</span></button>
      <button class="dock-item" data-tip="Seedlings"><span class="dock-emoji">🌱</span></button>
      <button class="dock-item" data-tip="Compost"><span class="dock-emoji">🪱</span></button>
      <button class="dock-item" data-tip="Harvest"><span class="dock-emoji">🧺</span></button>
      <span class="dock-sep"></span>
      <button class="dock-item" data-tip="Journal"><span class="dock-emoji">📓</span></button>
      <button class="dock-item" data-tip="Weather"><span class="dock-emoji">🌦️</span></button>
      <button class="dock-item" data-tip="Settings"><span class="dock-emoji">⚙️</span></button>
    </nav>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
