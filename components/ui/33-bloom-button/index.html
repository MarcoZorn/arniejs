<!doctype html>
<!-- description: Hover to watch organic petals unfold around the button, like a flower opening. -->
<!-- category: buttons -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bloom Button — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="stage">
  <h1 class="stage__title">Bloom button</h1>
  <p class="stage__sub">Hover to watch organic petals unfold around the button, like a flower opening.</p>

  <div class="grid">
    <button class="bloom-btn" type="button">
      <span class="bloom-btn__petals" aria-hidden="true">
        <span class="petal petal--1"></span>
        <span class="petal petal--2"></span>
        <span class="petal petal--3"></span>
        <span class="petal petal--4"></span>
        <span class="petal petal--5"></span>
        <span class="petal petal--6"></span>
      </span>
      <span class="bloom-btn__label">Let it bloom</span>
    </button>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
