<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Soil Textarea — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="stage">
  <h1 class="stage__title">Soil textarea</h1>
  <p class="stage__sub">An auto-growing field that expands as your notes take root.</p>

  <div class="soil">
    <textarea
      class="soil__area"
      id="soilArea"
      rows="1"
      maxlength="280"
      placeholder="Jot down your planting notes…"
    ></textarea>
    <span class="soil__count" id="soilCount">0 / 280</span>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
