<link rel="stylesheet" href="style.css">
<main class="demo">
  <button type="button" class="demo__trigger" id="openCartBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M3 3h2l.4 2M7 13h10l3-8H5.4M7 13L5.4 5M7 13l-1.5 4h11.5M9 21a1 1 0 100-2 1 1 0 000 2zM18 21a1 1 0 100-2 1 1 0 000 2z" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Open Cart
    <span class="demo__badge" id="cartCount">3</span>
  </button>
  <p class="demo__note">Open the drawer, adjust quantities, or remove items.</p>

  <div class="cart-overlay" id="cartOverlay"></div>

  <aside class="cart-drawer" id="cartDrawer" role="dialog" aria-modal="true" aria-label="Shopping cart">
    <header class="cart-drawer__header">
      <h2 class="cart-drawer__title">Your Cart <span id="itemCountLabel">(3)</span></h2>
      <button type="button" class="cart-drawer__close" id="closeCartBtn" aria-label="Close cart">
        <svg width="16" height="16" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <ul class="cart-drawer__list" id="cartList">
      <li class="cart-item" data-id="1" data-price="48">
        <div class="cart-item__img" style="background: linear-gradient(135deg, #d4a85a, #c4622d);" aria-hidden="true"></div>
        <div class="cart-item__info">
          <p class="cart-item__name">Terra Canvas Tote</p>
          <p class="cart-item__price">$48.00</p>
          <div class="cart-item__qty">
            <button type="button" class="cart-item__qty-btn" data-action="dec" aria-label="Decrease quantity">&minus;</button>
            <span class="cart-item__qty-value" data-qty>1</span>
            <button type="button" class="cart-item__qty-btn" data-action="inc" aria-label="Increase quantity">+</button>
          </div>
        </div>
        <button type="button" class="cart-item__remove" aria-label="Remove Terra Canvas Tote">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </button>
      </li>
      <li class="cart-item" data-id="2" data-price="32">
        <div class="cart-item__img" style="background: linear-gradient(135deg, #8fa86e, #5a7a3a);" aria-hidden="true"></div>
        <div class="cart-item__info">
          <p class="cart-item__name">Moss Linen Cap</p>
          <p class="cart-item__price">$32.00</p>
          <div class="cart-item__qty">
            <button type="button" class="cart-item__qty-btn" data-action="dec" aria-label="Decrease quantity">&minus;</button>
            <span class="cart-item__qty-value" data-qty>1</span>
            <button type="button" class="cart-item__qty-btn" data-action="inc" aria-label="Increase quantity">+</button>
          </div>
        </div>
        <button type="button" class="cart-item__remove" aria-label="Remove Moss Linen Cap">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </button>
      </li>
      <li class="cart-item" data-id="3" data-price="21">
        <div class="cart-item__img" style="background: linear-gradient(135deg, #9b6b3a, #6b5540);" aria-hidden="true"></div>
        <div class="cart-item__info">
          <p class="cart-item__name">Clay Mug Set</p>
          <p class="cart-item__price">$21.00</p>
          <div class="cart-item__qty">
            <button type="button" class="cart-item__qty-btn" data-action="dec" aria-label="Decrease quantity">&minus;</button>
            <span class="cart-item__qty-value" data-qty>1</span>
            <button type="button" class="cart-item__qty-btn" data-action="inc" aria-label="Increase quantity">+</button>
          </div>
        </div>
        <button type="button" class="cart-item__remove" aria-label="Remove Clay Mug Set">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M1 1L13 13M13 1L1 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </button>
      </li>
    </ul>

    <p class="cart-drawer__empty" id="emptyState" hidden>Your cart is empty.</p>

    <footer class="cart-drawer__footer">
      <div class="cart-drawer__subtotal">
        <span>Subtotal</span>
        <span id="subtotalValue">$101.00</span>
      </div>
      <button type="button" class="cart-drawer__checkout" id="checkoutBtn">Checkout</button>
    </footer>
  </aside>
</main>
<script src="script.js"></script>
