<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Logo Marquee — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="stage">
  <header class="intro">
    <p class="eyebrow">Trusted by teams everywhere</p>
    <h1>Powering modern products</h1>
  </header>

  <section class="marquee" aria-label="Partner logos">
    <div class="row row--left">
      <div class="track" data-track></div>
    </div>
    <div class="row row--right">
      <div class="track" data-track></div>
    </div>
  </section>

  <p class="hint">Hover any row to pause. Two rows, opposite directions, seamless loop.</p>
</main>
<script src="script.js"></script>
</body>
</html>
