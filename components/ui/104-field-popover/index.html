<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Field Popover — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="demo">
  <div class="anchor-wrap">
    <button class="trigger" id="popoverTrigger" aria-haspopup="true" aria-expanded="false">
      Field Options ▾
    </button>
    <div class="popover" id="popover" role="menu">
      <button class="pop-item" role="menuitem">🌱 Sow new bed</button>
      <button class="pop-item" role="menuitem">💧 Schedule watering</button>
      <button class="pop-item" role="menuitem">🧑‍🌾 Assign worker</button>
      <div class="pop-divider"></div>
      <button class="pop-item pop-danger" role="menuitem">🔥 Clear field</button>
    </div>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
