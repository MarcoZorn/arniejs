<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Holographic Card — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="stage">
  <h1 class="stage__title">Holographic card</h1>
  <p class="stage__sub">Tilt with your cursor to catch the amber-copper shimmer.</p>

  <div class="holo-wrap">
    <article class="holo" id="holoCard">
      <div class="holo__shine"></div>
      <div class="holo__glare"></div>
      <div class="holo__content">
        <span class="holo__badge">Rare Find</span>
        <h2 class="holo__title">Copper Ember Bloom</h2>
        <p class="holo__desc">A hand-fired ceramic piece, glazed in shifting terracotta light.</p>
        <div class="holo__foot">
          <span>No. 014 / 100</span>
          <span>Kiln Series</span>
        </div>
      </div>
    </article>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
