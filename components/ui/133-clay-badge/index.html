<!doctype html>
<!-- description: A notification badge that pops with a genuine scale animation each time the count changes. -->
<!-- category: misc -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Clay Badge — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="wrap">
  <header class="intro">
    <h1>Clay Badge</h1>
    <p>A notification badge that pops with a genuine scale animation each time the count changes.</p>
  </header>

  <section class="card">
    <div class="icon-wrap">
      <button class="icon-btn" type="button" aria-label="Notifications">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
      </button>
      <span class="badge" data-badge>3</span>
    </div>

    <div class="controls">
      <button class="btn btn--ghost" type="button" data-reset>Reset</button>
      <button class="btn" type="button" data-decrement>−1</button>
      <button class="btn btn--primary" type="button" data-increment>+1</button>
      <button class="btn btn--rust" type="button" data-surge>+5 surge</button>
    </div>
  </section>
</main>
<script src="script.js"></script>
</body>
</html>
