<!doctype html>
<!-- description: A reusable set of modern, tactile button styles. -->
<!-- category: misc -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Glow Buttons — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="stage">
  <h1 class="stage__title">Glow buttons</h1>
  <p class="stage__sub">A reusable set of modern, tactile button styles.</p>

  <div class="grid">
    <button class="btn btn--conic" type="button"><span>Conic glow</span></button>
    <button class="btn btn--shimmer" type="button"><span>Shimmer sweep</span></button>
    <button class="btn btn--magnetic" id="magnetic" type="button"><span>Magnetic</span></button>
    <button class="btn btn--ghost" type="button"><span>Ghost outline</span></button>
    <button class="btn btn--load" id="loadBtn" type="button">
      <span class="btn__label">Load data</span>
      <span class="btn__spinner" aria-hidden="true"></span>
    </button>
    <button class="btn btn--success" id="successBtn" type="button">
      <span class="btn__text">Confirm</span>
      <svg class="btn__check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M5 13l4 4L19 7"/></svg>
    </button>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
