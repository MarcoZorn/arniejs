<link rel="stylesheet" href="style.css">

<main class="stage">
  <h1 class="stage__title">Glitch button</h1>
  <p class="stage__sub">Hover for a warm-toned channel-shift glitch — rust and terracotta split, not neon.</p>

  <div class="grid">
    <button class="glitch-btn" type="button" data-text="System override">
      <span class="glitch-btn__label">System override</span>
      <span class="glitch-btn__layer glitch-btn__layer--rust" aria-hidden="true">System override</span>
      <span class="glitch-btn__layer glitch-btn__layer--terra" aria-hidden="true">System override</span>
    </button>
  </div>
</main>

<script src="script.js"></script>
