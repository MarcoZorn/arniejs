<html lang="en">
<head>

<title>Social Share Card — ArnieJS component</title>

<body>
<main class="share-wrap">

        </svg>
        <span>Twitter</span>
      </a>
      <a class="share-btn share-btn--chat" href="https://api.whatsapp.com/send?text=Why%20slow-growing%20gardens%20outlast%20the%20fast%20ones%20-%20https%3A%2F%2Fexample.com%2Farticles%2Fslow-growing-gardens" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path d="M4 20l1.3-4A8 8 0 1 1 8.8 19L4 20z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />
          <circle cx="9" cy="12" r="1" />
          <circle cx="12" cy="12" r="1" />
          <circle cx="15" cy="12" r="1" />
        </svg>
        <span>Chat</span>
      </a>
      <a class="share-btn share-btn--mail" href="mailto:?subject=Why%20slow-growing%20gardens%20outlast%20the%20fast%20ones&body=Thought%20you%27d%20like%20this%3A%20https%3A%2F%2Fexample.com%2Farticles%2Fslow-growing-gardens" target="_blank" rel="noopener noreferrer">

          <rect x="3.5" y="5.5" width="17" height="13" rx="2" fill="none" stroke="currentColor" stroke-width="1.7" />
          <path d="M4.5 6.5l7.5 6 7.5-6" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />
        </svg>
        <span>Email</span>
      </a>
      <button class="share-btn share-btn--link" type="button" data-copy="https://example.com/articles/slow-growing-gardens">
        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
          <path d="M9.5 14.5l5-5" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" />
