<!doctype html>
<!-- description: Click the hamburger — it morphs into an X and reveals the menu. -->
<!-- category: navigation -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hamburger Morph — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="demo">
  <header class="topbar">
    <span class="brand">🌾 Arnie</span>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu" aria-expanded="false">
      <span class="bar bar1"></span>
      <span class="bar bar2"></span>
      <span class="bar bar3"></span>
    </button>
  </header>
  <div class="panel" id="panel" aria-hidden="true">
    <nav class="panel-nav">
      <a href="#" class="panel-link">Homestead</a>
      <a href="#" class="panel-link">Garden Log</a>
      <a href="#" class="panel-link">Almanac</a>
      <a href="#" class="panel-link">Community</a>
      <a href="#" class="panel-link">Settings</a>
    </nav>
  </div>
  <section class="stage">
    <p class="hint">Click the hamburger — it morphs into an X and reveals the menu.</p>
  </section>
</main>
<script src="script.js"></script>
</body>
</html>
