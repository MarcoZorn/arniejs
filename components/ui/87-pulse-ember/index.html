<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pulse Ember — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="wrap">
  <header class="head">
    <h1>Pulse Ember</h1>
    <p>A glowing ember pulsing warmth outward, ring by ring.</p>
  </header>

  <section class="stage" aria-label="Loading indicator">
    <div class="ember" role="status" aria-label="Loading">
      <span class="ring ring-1"></span>
      <span class="ring ring-2"></span>
      <span class="ring ring-3"></span>
      <span class="core"></span>
    </div>
  </section>

  <div class="controls">
    <button type="button" id="toggle-btn" class="toggle-btn">Pause</button>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
