<!doctype html>
<!-- description: A quiet record of what you've been browsing, in case you want to circle back. -->
<!-- category: ecommerce -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recently Viewed Products — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="recent-wrap">
  <div class="recent-head">
    <div>
      <p class="recent-eyebrow">Your trail</p>
      <h1 class="recent-title">Recently viewed</h1>
      <p class="recent-sub">A quiet record of what you've been browsing, in case you want to circle back.</p>
    </div>
    <div class="recent-nav">
      <button type="button" class="recent-nav-btn" data-scroll="prev" aria-label="Scroll left">&#8249;</button>
      <button type="button" class="recent-nav-btn" data-scroll="next" aria-label="Scroll right">&#8250;</button>
    </div>
  </div>

  <div class="recent-strip" data-strip tabindex="0" aria-label="Recently viewed products">
    <article class="recent-card">
      <div class="recent-thumb" style="--c1:#5a7a3a; --c2:#8fa86e;"></div>
      <span class="recent-name">Moss Trellis Planter</span>
      <span class="recent-price">$34</span>
    </article>
    <article class="recent-card">
      <div class="recent-thumb" style="--c1:#9b6b3a; --c2:#d4a85a;"></div>
      <span class="recent-name">Clay Watering Can</span>
      <span class="recent-price">$22</span>
    </article>
    <article class="recent-card">
      <div class="recent-thumb" style="--c1:#a03820; --c2:#c4622d;"></div>
      <span class="recent-name">Rust Pruning Shears</span>
      <span class="recent-price">$18</span>
    </article>
    <article class="recent-card">
      <div class="recent-thumb" style="--c1:#3d2b14; --c2:#5a3e20;"></div>
      <span class="recent-name">Cedar Garden Stool</span>
      <span class="recent-price">$56</span>
    </article>
    <article class="recent-card">
      <div class="recent-thumb" style="--c1:#8fa86e; --c2:#5a7a3a;"></div>
      <span class="recent-name">Sage Seed Tray Set</span>
      <span class="recent-price">$15</span>
    </article>
    <article class="recent-card">
      <div class="recent-thumb" style="--c1:#d4a85a; --c2:#9b6b3a;"></div>
      <span class="recent-name">Sand Terracotta Pot</span>
      <span class="recent-price">$28</span>
    </article>
    <article class="recent-card">
      <div class="recent-thumb" style="--c1:#c4622d; --c2:#a03820;"></div>
      <span class="recent-name">Terra Bulb Planter</span>
      <span class="recent-price">$41</span>
    </article>
    <article class="recent-card">
      <div class="recent-thumb" style="--c1:#5a3e20; --c2:#9b6b3a;"></div>
      <span class="recent-name">Timber Raised Bed Kit</span>
      <span class="recent-price">$139</span>
    </article>
  </div>
</main>
<script src="script.js"></script>
</body>
</html>
