<!doctype html>
<!-- description: Press a real combo below — the matching branch will glow. -->
<!-- category: misc -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bark Shortcut — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="bark-panel">
  <header class="bark-header">
    <h1 class="bark-title">Shortcut Grove</h1>
    <p class="bark-subtitle">Press a real combo below — the matching branch will glow.</p>
  </header>

  <ul class="bark-list">
    <li class="bark-row" data-keys="ctrl+k">
      <span class="bark-label">Open command palette</span>
      <span class="bark-combo">
        <kbd class="bark-key">Ctrl</kbd>
        <span class="bark-plus">+</span>
        <kbd class="bark-key">K</kbd>
      </span>
    </li>

    <li class="bark-row" data-keys="ctrl+shift+s">
      <span class="bark-label">Save changes</span>
      <span class="bark-combo">
        <kbd class="bark-key">Ctrl</kbd>
        <span class="bark-plus">+</span>
        <kbd class="bark-key">Shift</kbd>
        <span class="bark-plus">+</span>
        <kbd class="bark-key">S</kbd>
      </span>
    </li>

    <li class="bark-row" data-keys="escape">
      <span class="bark-label">Close dialog</span>
      <span class="bark-combo">
        <kbd class="bark-key">Esc</kbd>
      </span>
    </li>

    <li class="bark-row" data-keys="arrowup" data-keys-alt="arrowdown">
      <span class="bark-label">Navigate list</span>
      <span class="bark-combo">
        <kbd class="bark-key">↑</kbd>
        <span class="bark-plus">/</span>
        <kbd class="bark-key">↓</kbd>
      </span>
    </li>

    <li class="bark-row" data-keys="ctrl+enter">
      <span class="bark-label">Submit form</span>
      <span class="bark-combo">
        <kbd class="bark-key">Ctrl</kbd>
        <span class="bark-plus">+</span>
        <kbd class="bark-key">Enter</kbd>
      </span>
    </li>

    <li class="bark-row" data-keys="ctrl+/">
      <span class="bark-label">Show keyboard help</span>
      <span class="bark-combo">
        <kbd class="bark-key">Ctrl</kbd>
        <span class="bark-plus">+</span>
        <kbd class="bark-key">/</kbd>
      </span>
    </li>
  </ul>
</main>
<script src="script.js"></script>
</body>
</html>
