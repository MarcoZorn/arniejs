<!doctype html>
<!-- description: Greenhouse access -->
<!-- category: forms -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pin Code Input — ArnieJS component</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main class="pci-wrap">
  <section class="pci-card">
    <p class="pci-eyebrow">Greenhouse access</p>
    <h1 class="pci-title">Enter your 6-digit gate code</h1>
    <p class="pci-hint-text">Type each digit, paste the whole code at once, or arrow between boxes — backspace hops back and clears as you go.</p>

    <div class="pci-boxes" id="pci-boxes">
      <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="pci-box" data-index="0" aria-label="Digit 1 of 6">
      <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="pci-box" data-index="1" aria-label="Digit 2 of 6">
      <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="pci-box" data-index="2" aria-label="Digit 3 of 6">
      <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="pci-box" data-index="3" aria-label="Digit 4 of 6">
      <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="pci-box" data-index="4" aria-label="Digit 5 of 6">
      <input type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" class="pci-box" data-index="5" aria-label="Digit 6 of 6">
    </div>

    <p class="pci-status" id="pci-status" role="status" aria-live="polite">6 digits remaining</p>
  </section>
</main>
<script src="script.js"></script>
</body>
</html>
